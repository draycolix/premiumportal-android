name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK via sdkmanager
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "=== Install cmdline-tools ==="
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools.zip
          export ANDROID_HOME=$HOME/android-sdk
          echo "sdk.dir=$ANDROID_HOME" > $GITHUB_WORKSPACE/local.properties
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          
          # Accept licenses and install platforms
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -10
          
          echo "=== SDK installed ==="
          ls -la $ANDROID_HOME/platforms/
          ls -la $ANDROID_HOME/build-tools/

      - name: Test Gradle wrapper
        run: |
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 || echo "Wrapper failed, using system gradle"

      - name: Build APK
        run: |
          chmod +x gradlew
          cat local.properties
          export ANDROID_HOME=$HOME/android-sdk
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: premium-portal-apk
          path: app/build/outputs/apk/debug/*.apk
