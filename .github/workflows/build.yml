name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Install Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
          export ANDROID_HOME=/usr/lib/android-sdk
          export ANDROID_SDK_ROOT=/usr/lib/android-sdk
          
          # Accept licenses
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          
          # Install required SDK components
          sudo $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME 2>&1 | tail -5 || true
          
          # Verify
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ || echo "No platforms dir"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/lib/android-sdk
          ANDROID_SDK_ROOT: /usr/lib/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: premium-portal-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
