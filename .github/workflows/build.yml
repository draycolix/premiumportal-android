name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          # Check if SDK already exists
          if [ -d "$ANDROID_HOME" ]; then
            echo "SDK found at $ANDROID_HOME"
            ls "$ANDROID_HOME/"
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          elif [ -d "/usr/local/lib/android/sdk" ]; then
            echo "SDK found at /usr/local/lib/android/sdk"
            export ANDROID_HOME=/usr/local/lib/android/sdk
            ls "$ANDROID_HOME/"
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          else
            echo "No SDK found, downloading..."
            mkdir -p $HOME/android-sdk
            cd $HOME/android-sdk
            curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdline-tools.zip
            mkdir -p cmdline-tools/latest
            mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
            export ANDROID_HOME=$HOME/android-sdk
            echo "sdk.dir=$ANDROID_HOME" > $GITHUB_WORKSPACE/local.properties
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5
          fi
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          cat $GITHUB_WORKSPACE/local.properties

      - name: Enable Gradle Wrapper
        run: chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: premium-portal-apk
          path: app/build/outputs/apk/debug/*.apk
