name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "SDK root:"
          ls -la /usr/local/lib/android/sdk/ 2>/dev/null || echo "Not found at default"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "ANDROID_HOME not found"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Build APK with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: premium-portal-apk
          path: app/build/outputs/apk/debug/*.apk
