name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix SDK and create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/ 2>/dev/null
          ls $ANDROID_HOME/platforms/ 2>/dev/null
          ls $ANDROID_HOME/build-tools/ 2>/dev/null
          which sdkmanager 2>/dev/null || find $ANDROID_HOME -name sdkmanager -type f 2>/dev/null

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          arguments: assembleDebug --no-daemon --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: premium-portal-apk
          path: app/build/outputs/apk/debug/*.apk
