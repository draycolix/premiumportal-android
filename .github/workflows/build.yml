name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Debug SDK
        run: |
          ls -la /Applications/android-sdk* 2>/dev/null || echo "not at apps"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "no ANDROID_HOME"
          # Check common macOS locations
          for dir in ~/Library/Android/sdk /usr/local/share/android-sdk /opt/homebrew/share/android-sdk; do
            [ -d "$dir" ] && echo "FOUND SDK at $dir" && ls "$dir/" | head -10
          done
          # Set SDK path
          if [ -d "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          elif [ -d "$HOME/Library/Android/sdk" ]; then
            echo "sdk.dir=$HOME/Library/Android/sdk" > local.properties
          else
            echo "sdk.dir=/usr/local/share/android-sdk" > local.properties
          fi
          cat local.properties

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: premium-portal-apk
          path: app/build/outputs/apk/debug/*.apk
